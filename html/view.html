<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="./css/bg.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>文章预览</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2, h3 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        code { background-color: #f6f8fa; padding: 2px 4px; border-radius: 4px; }
        pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; } 
    </style>
</head>
<body>
    <h1>预览结果</h1>
    
    <hr>
    <div id = "content">
    </div>
    <hr>
    <button id = 'detele' style = "margin-left: -300px; margin-top: 500px;background-color: rgba(0, 255, 255, 0.139);">删除此文章</button>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const contentId = urlParams.get('content_id');

    if (!contentId) {
        console.error("没有 ID！");
        return;
    }

    try {
        const response = await fetch('/api/view', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
            },
            body: JSON.stringify({ content_id: contentId })
        });
        const data = await response.json();
        document.getElementById('content').innerHTML = data.Content;
        console.log('后端返回:', data);

    } catch (error) {
        console.error("请求失败:", error);
    }});
    </script>

    <script type = "module">
        import jwtDecode from 'https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/+esm';
        document.getElementById('detele').addEventListener('click',async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const token = localStorage.getItem('token')
            const uid = jwtDecode(token).id
            const cid = urlParams.get('content_id');
            console.log(cid,uid);
            if (!token) {
                alert("请先登录！")
                window.location.href = '/login';
                return
            }

            const response = await fetch('/api/view',{
                method:'DELETE',
                headers:{
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body:JSON.stringify({
                    uid : uid,
                    cid : cid,
                })})

            const data = await response.json();
            console.log('删除成功！',data.msg);
            window.location.href = '/home';
        })
    </script>
</body>
</html>
